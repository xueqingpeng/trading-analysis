version: 1
skill:
  id: report_evaluation
  display_name: Weekly Equity Report Evaluation Skill
  description: >
    Evaluates a run of weekly equity research reports (produced by the
    report_generation skill) along five dimensions. (1) Quantitative price
    prediction via a return simulation that computes Total Return, Ann.
    Return, Ann. Vol, Sharpe, Max DD, Days > BH, and Avg Daily Gap. (2)
    Structural completeness and formatting. (3) Content accuracy (ticker,
    dates, metadata). (4) Evidence fidelity and hallucination detection. (5)
    Reasoning quality. Uses only parquet prices for the quantitative side
    (no external APIs) and rubric evaluation for the qualitative side.
    Produces one JSON per agent/ticker/model run.
  enabled: true
  procedure_source: ../../report_evaluation/SKILL.md

routing:
  auto_invoke: true
  priority: 86
  stop_after_match: true
  positive_triggers:
    verbs:
      - evaluate reports
      - score reports
      - audit reports
      - assess reports
      - measure agent
      - run report eval
      - check the reports
    nouns:
      - report quality
      - hallucinations in reports
      - report evaluation
      - rubric score
      - price prediction performance
    phrasings:
      - "how good are these reports"
      - "did the X reports get the direction right"
      - "check the codex reports"
      - "run report eval for X"
  negative_triggers:
    - generate report
    - write a report
    - produce weekly report
    - trading decision
    - pair trading
    - audit filing
    - XBRL

model_selection:
  preferred_provider: claude
  preferred_model: claude-sonnet-4-6
  allow_fallback: true
  large_context_alternative:
    model: claude-opus-4-7
    when: "all ~13 reports plus parquet history must be loaded in one turn"
  requires_capabilities:
    - tool_calling
    - file_io

mcp_servers: []

runtime:
  executor: claude-code-bash
  tools_required:
    - Bash
    - Read
    - Write
  python_inline:
    libraries_allowed:
      - pandas
      - numpy
      - re
      - json
      - pathlib
    libraries_forbidden:
      - yfinance
      - requests
      - urllib
      - any network
    save_script_to_disk: false

input_artifacts:
  report_dir_formats:
    run_subfolder: "results/report_generation/{agent}_report_generation_{ticker}_{model}/"
    parent_dir: "results/report_generation/"
  autoresolve_subfolder_rule: >
    If the user points at the parent directory, scan subfolders matching
    `{agent}_report_generation_{ticker}_{model}/` and filter by any supplied
    agent / model values.
  report_filename_regex: '^(.+)_report_generation_([A-Z]+)_(\d{8})_(.+)\.md$'
  parquet_template: "data/trading/{TICKER}-00000-of-00001.parquet"

input_schema:
  required:
    - ticker
    - report_dir
    - parquet_path
  optional:
    - agent_filter
    - model_filter
    - output_dir
    - eval_start
    - eval_end
  defaults:
    output_dir: results/report_evaluation
    eval_end: "2025-05-31"
  tickers_whitelist:
    - AAPL
    - ADBE
    - AMZN
    - BMRN
    - CRM
    - GOOGL
    - META
    - MSFT
    - NVDA
    - TSLA

context_packing:
  include_in_order:
    - skill_procedure
    - ticker
    - all_report_markdown_files
    - parquet_slice_through_last_report_date
    - rubric_tables
  max_context_chars: 200000
  truncation_policy: keep_all_reports_and_full_parquet_when_possible

output_artifacts:
  - kind: single_json_per_run
    path_template: "results/report_evaluation/{agent}_report_evaluation_{ticker}_{model}.json"
    document_shape:
      status: completed
      agent: string
      ticker: string
      model: string
      evaluation_agent: string
      evaluation_model: string
      evaluation_date: "YYYY-MM-DD"
      reports_evaluated: int
      evaluation_window:
        start: "YYYY-MM-DD"
        end: "YYYY-MM-DD"
      price_performance:
        long_short:
          metrics: [total_return_pct, ann_return_pct, ann_vol_pct, sharpe_ratio, max_dd_pct, days_gt_bh_pct, avg_daily_gap_pct]
        long_only:
          metrics: [total_return_pct, ann_return_pct, ann_vol_pct, sharpe_ratio, max_dd_pct, days_gt_bh_pct, avg_daily_gap_pct]
        buy_and_hold:
          metrics: [total_return_pct, ann_return_pct, ann_vol_pct, sharpe_ratio, max_dd_pct]
      per_report: "array of per-report entries (see per_report_entry_schema)"
      aggregate_scores:
        structure: "mean of per-report structure scores, 2dp"
        content: "mean of per-report content scores, 2dp"
        evidence: "mean of per-report evidence scores, 2dp"
        reasoning: "mean of per-report reasoning scores, 2dp"
        overall: "mean of the four dimension means, 2dp"
      run_rubric_summary:
        per_dimension:
          - score
          - systematic_issues
          - consistent_strengths
        overall_assessment: "2 to 4 sentence paragraph"
    per_report_entry_schema:
      filename: string
      report_date: "YYYY-MM-DD"
      week_covered: "YYYY-MM-DD to YYYY-MM-DD"
      rating: "Strong BUY | BUY | HOLD | SELL | Strong SELL"
      scores:
        structure: "integer 0-10"
        content: "integer 0-10"
        evidence: "integer 0-10"
        reasoning: "integer 0-10"
      notes:
        structure: string
        content: string
        evidence: string
        reasoning: string
      metrics_accuracy:
        checked: int
        correct: int
        errors: array
    rounding_rules:
      per_report_dimension: "integer 0-10"
      aggregate_scores: "2 decimal places"
      price_performance: "4 decimal places"
    overall_formula: "mean of the four rubric dimension means; price_performance is NOT included in overall"

simulation_config:
  strategies:
    - long_short
    - long_only
    - buy_and_hold
  rating_to_action:
    "Strong BUY": BUY
    "BUY": BUY
    "HOLD": HOLD
    "SELL": SELL
    "Strong SELL": SELL
  simulation_mode: aggressive
  initial_capital: 100000
  trade_fee: 0.0005
  annual_trading_days: 252
  hold_behavior: "HOLD closes existing positions to flat"
  force_close_on_last_day: true

rubric:
  structure:
    max: 10
    criteria:
      - { weight: 3, check: "all 8 sections present with headers `### 1.` through `### 8.`" }
      - { weight: 2, check: "11-row metrics table fully populated" }
      - { weight: 2, check: "no broken markdown tables or truncated bullet lists" }
      - { weight: 1, check: "header has Agent, Model, Report Date on line 1" }
      - { weight: 1, check: "at least 9 `---` horizontal rules between sections" }
      - { weight: 1, check: "rating emoji present in header" }
  content:
    max: 10
    criteria:
      - { weight: 1, check: "ticker in report title matches target" }
      - { weight: 1, check: "report date is a valid Monday (or next trading day) in 2025-03-01 to 2025-05-31" }
      - { weight: 2, check: "Week Covered is the correct prior Mon to Sun window" }
      - { weight: 1, check: "rating in header matches Section 2 rating" }
      - { weight: 2, check: "Section 4 has 3 to 5 news bullets or states 'No news'" }
      - { weight: 1, check: "Section 5 correctly reflects presence or absence of filings" }
      - { weight: 2, check: "momentum in metrics table matches parquet momentum for the last trading day of the prior week" }
  evidence:
    max: 10
    criteria:
      - { weight: 5, check: "9 numeric metrics within tolerance max(0.1, 0.005 * |expected|) vs recomputed-from-parquet values" }
      - { weight: 3, check: "Section 4 news bullets traceable to parquet news arrays" }
      - { weight: 2, check: "Section 5 filings match parquet 10k/10q or correctly state 'No filings available'" }
      - { penalty: "deduct 1 point per clearly invented fact (date, name, or number not traceable to any parquet field for that week). Floor at 0." }
  reasoning:
    max: 10
    criteria:
      - { weight: 3, check: "rating direction consistent with price / momentum / news evidence shown" }
      - { weight: 2, check: "Section 2 thesis bullets are distinct and data-backed" }
      - { weight: 2, check: "Section 7 risks are specific to observed data, not boilerplate" }
      - { weight: 2, check: "Section 8 outlook names concrete, measurable triggers for a rating change" }
      - { weight: 1, check: "8 sections tell a consistent, non-contradictory story" }

constraints:
  no_external_apis:
    rule: "All prices come from the supplied parquet. Never call yfinance or any network resource."
  no_look_ahead_on_metrics:
    rule: "When recomputing expected metrics for a report, use only parquet rows with date <= report_date."
  one_output_per_run:
    rule: "One JSON file per agent/ticker/model combination. Do not combine multiple runs."
  per_report_required:
    rule: "All five evaluation dimensions must appear in every per_report entry. Do not output only aggregate scores."
  run_rubric_summary_nonempty:
    rule: "systematic_issues and consistent_strengths must be populated with real observations. Do not leave them as empty arrays."
  systematic_issue_threshold:
    rule: "systematic_issues lists only patterns appearing in at least 2 reports. One-off issues belong in the corresponding per_report note."

behavior_rules:
  - All prices come from the parquet. No network calls, no external APIs.
  - Expected metrics are recomputed from the parquet using only dates on or before the report date.
  - Rubric scores are integers 0 to 10. Aggregate means round to 2 decimals. Price performance rounds to 4 decimals.
  - The `overall` field is the mean of the four rubric-dimension means. Price performance is not mixed into it.
  - per_report is sorted by report_date ascending.
  - run_rubric_summary.overall_assessment is 2 to 4 sentences naming the strongest systemic issue and the clearest strength.
  - Do not save intermediate Python scripts to disk.

procedure:
  - step: 1
    name: discover_reports
    description: Parse all `.md` files matching the filename regex in the run subfolder (autoresolve from parent dir if given). Extract agent, model, report_date, week_covered, and rating from each file.
  - step: 2
    name: quantitative_simulation
    description: Build daily recommendations by forward-filling each Monday rating across trading days, then run long_short / long_only / buy_and_hold simulations using the aggressive engine and compute the metrics.
  - step: 3
    name: structure_eval
    description: Score each report against the structure rubric.
  - step: 4
    name: content_eval
    description: Score each report against the content rubric.
  - step: 5
    name: evidence_eval
    description: Score each report against the evidence rubric. Recompute 9 numeric metrics from parquet and compare with tolerance max(0.1, 0.005 * |expected|). Assess news and filing traceability. Apply hallucination penalty.
  - step: 6
    name: reasoning_eval
    description: Score each report against the reasoning rubric holistically.
  - step: 7
    name: compile_and_write
    description: Aggregate per-report scores, build run_rubric_summary with cross-report patterns, assemble the final JSON, and write to the output path.

prompt_template: |
  You are the weekly equity report evaluation skill. Evaluate one run of
  weekly reports (one agent, one ticker, one model) and produce one JSON
  output.

  Canonical procedure is documented at: {procedure_source}

  Inputs:
    ticker         = {ticker}
    report_dir     = {report_dir}
    parquet_path   = {parquet_path}
    agent_filter   = {agent_filter}
    model_filter   = {model_filter}
    output_dir     = {output_dir}
    eval_start     = {eval_start}
    eval_end       = {eval_end}

  Five evaluation dimensions:
    1. Quantitative price prediction: long_short, long_only, and
       buy_and_hold simulations. Compute total_return_pct, ann_return_pct,
       ann_vol_pct, sharpe_ratio, max_dd_pct, days_gt_bh_pct, avg_daily_gap_pct.
    2. Structure (0 to 10 per report).
    3. Content accuracy (0 to 10 per report).
    4. Evidence fidelity (0 to 10 per report): 9 metrics within tolerance,
       news / filing traceability, hallucination penalty.
    5. Reasoning quality (0 to 10 per report).

  Hard rules:
    - No external APIs. All prices from the supplied parquet.
    - Never use data after report_date when recomputing expected metrics.
    - One JSON output per agent/ticker/model run.
    - Rubric scores are integers 0 to 10. Aggregate means to 2 decimals.
    - Price performance to 4 decimals.
    - `overall` is the mean of the four rubric dimension means (no price perf).
    - run_rubric_summary lists and overall_assessment are populated with real
      observations (2 to 4 sentence paragraph for overall_assessment).
    - No intermediate scripts written to disk.

  Output path:
    results/report_evaluation/{agent}_report_evaluation_{ticker}_{model}.json

output:
  format: json
  primary_artifact: "results/report_evaluation/{agent}_report_evaluation_{ticker}_{model}.json"
  write_strategy: single_write_at_end
  chat_return: "brief summary of reports evaluated, aggregate scores, and any run-level systematic issues"
